name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    uses: netresearch/typo3-ci-workflows/.github/workflows/release-typo3-extension.yml@main
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      archive-prefix: nr-scheduler
      package-name: netresearch/nr-scheduler
      extension-key: nr_scheduler
    secrets:
      TYPO3_TER_ACCESS_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
